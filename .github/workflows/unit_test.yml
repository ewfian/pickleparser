name: Unit Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        node: ['18', '20', '22', '24']
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'
    - name: Setup Node.js ${{ matrix.node }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node }}
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: NPM Install
      run: npm ci
    - name: Lint
      run: npm run lint
    - name: Build and test
      run: npm run build && npm test
        
